# cargo-deny configuration — license compliance and security advisories.
# Run locally with: cargo deny check

[advisories]
# Fail on any security advisory or unmaintained-crate warning.
yanked = "deny"

[licenses]
# Fluxion is MIT; only permit permissive licenses in the dependency tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]
confidence-threshold = 0.9

[bans]
# Warn when the tree pulls in multiple major versions of the same crate.
multiple-versions = "warn"

[sources]
# Only allow crates from the official registry.
unknown-registry = "deny"
unknown-git = "deny"
