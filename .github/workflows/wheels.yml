name: wheels

# Build distributable wheels. CPU wheels (the default build) are built here for every platform on a
# version tag or manual dispatch. GPU wheels need a CUDA toolkit at build time and so are built
# separately on a CUDA-equipped host — see the `gpu-wheel` note below.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  cpu-wheels:
    name: CPU wheel (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # One abi3 wheel (cp310-abi3) covers CPython 3.10+; pin the build interpreter to 3.12 since
      # PyO3 0.22 doesn't support 3.14 (the runners' default).
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release -m crates/fluxion-py/Cargo.toml --out dist --interpreter 3.12
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-cpu-${{ matrix.os }}
          path: dist

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: -m crates/fluxion-py/Cargo.toml --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  # GPU wheel — built with the CUDA toolkit + the `cuda` feature on a self-hosted CUDA runner
  # (label `cuda`); GitHub-hosted runners have no CUDA toolkit. maturin-action's manylinux container
  # also lacks CUDA, so we build directly on the runner. The wheel carries a `+cu12` local version so
  # it's distinguishable from the CPU wheel (`pip install fluxion==0.0.0+cu12` for the GPU build).
  gpu-wheel:
    name: GPU wheel (CUDA)
    runs-on: [self-hosted, cuda]
    steps:
      - uses: actions/checkout@v4
      - name: Build CUDA wheel
        run: |
          source "$HOME/.cargo/env"
          export CUDA_PATH=/usr/local/cuda PATH=/usr/local/cuda/bin:$PATH
          sed -i 's/^version = "0.0.0"/version = "0.0.0+cu12"/' crates/fluxion-py/pyproject.toml
          python3 -m venv /tmp/gpuwheel-venv
          /tmp/gpuwheel-venv/bin/pip install -q --upgrade pip "maturin>=1.5,<2"
          /tmp/gpuwheel-venv/bin/maturin build --release --features cuda \
            -m crates/fluxion-py/Cargo.toml --interpreter python3 --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-gpu
          path: dist
