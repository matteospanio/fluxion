name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-targets --locked
      - run: cargo test --workspace --locked

  lint:
    name: fmt & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  docs:
    name: rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `-D warnings` fails on any rustdoc issue (broken/ambiguous doc links); combined with the
      # workspace `missing_docs = "warn"` lint (denied by the clippy job), the public API stays
      # documented. `--lib` documents every library target (skipping the `fluxion` CLI binary, which
      # would otherwise collide with the facade lib's doc output).
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --lib --locked

  autodiff:
    name: autodiff (Burn CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # The Burn integration is behind an optional feature, so the default `test`/`lint` jobs skip it.
      # Exercise its analytic-VJP custom ops (sos, sos_trainable, sos_design, fir_trainable) here.
      - run: cargo clippy -p fluxion-autodiff --features burn --all-targets --locked -- -D warnings
      - run: cargo test -p fluxion-autodiff --features burn --locked
      # The facade's whole-graph autodiff surface (diff_process) is behind its own feature.
      - run: cargo test -p fluxion --features autodiff --locked

  realtime:
    name: realtime CLI (CPAL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      # play/record are behind the `realtime` feature (CPAL), so the default test/lint jobs skip them.
      - run: cargo clippy -p fluxion-cli --features realtime --all-targets --locked -- -D warnings
      - run: cargo test -p fluxion-cli --features realtime --locked

  parquet:
    name: batch IO + checkpoint import (Arrow/Parquet/safetensors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Columnar dataset IO pulls arrow/parquet, off the default build — exercise it explicitly.
      - run: cargo clippy -p fluxion-io --features parquet,checkpoint --all-targets --locked -- -D warnings
      - run: cargo test -p fluxion-io --features parquet,checkpoint --locked

  deny:
    name: cargo-deny (licenses & advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check

  python:
    name: python bindings (maturin + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/fluxion-py
      # torch / jax are not installed (heavy); those adapter tests skip — eager API, the analytic
      # gradcheck, and scipy filter-design parity are the guards here.
      - run: pip install --upgrade pip maturin numpy pytest scipy array_api_strict array-api-compat
      - run: maturin build --release -m crates/fluxion-py/Cargo.toml --out dist
      - run: pip install dist/*.whl
      - run: pytest crates/fluxion-py/tests/ -v

  benches:
    name: benches (compile-check only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Compile the Criterion harnesses so they can't rot; --no-run means we never spend CI time
      # actually measuring (benches are a local tool, this is just a build tripwire).
      - run: cargo bench --no-run -p fluxion-ops -p fluxion-backend --locked

  ffi:
    name: C ABI (staticlib + smoke.c)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p fluxion-ffi --locked
      - run: cargo build -p fluxion-ffi --locked
      # Prove the C ABI links and round-trips from actual C: compile the smoke test against the
      # checked-in header and the staticlib (-l:libfluxion_ffi.a forces static, not the .so), then run it.
      - name: compile & run the C smoke test
        run: |
          cc crates/fluxion-ffi/examples/smoke.c \
            -I crates/fluxion-ffi/include \
            -L target/debug -l:libfluxion_ffi.a \
            -lpthread -lm -ldl -o smoke
          ./smoke

  cuda:
    name: cuda check (API drift, no GPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # cubecl/cudarc load CUDA at *runtime*, so the CUDA code paths compile with no nvcc or GPU
      # present. Check only (never run) — this just catches API drift in the otherwise-untested
      # `cuda`-feature code.
      - run: cargo check -p fluxion-backend -p fluxion-autodiff --features cuda --locked
