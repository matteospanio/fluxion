name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-targets --locked
      - run: cargo test --workspace --locked

  lint:
    name: fmt & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  autodiff:
    name: autodiff (Burn CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # The Burn integration is behind an optional feature, so the default `test`/`lint` jobs skip it.
      # Exercise its analytic-VJP custom ops (sos, sos_trainable, sos_design, fir_trainable) here.
      - run: cargo clippy -p fluxion-autodiff --features burn --all-targets --locked -- -D warnings
      - run: cargo test -p fluxion-autodiff --features burn --locked
      # The facade's whole-graph autodiff surface (diff_process) is behind its own feature.
      - run: cargo test -p fluxion --features autodiff --locked

  realtime:
    name: realtime CLI (CPAL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      # play/record are behind the `realtime` feature (CPAL), so the default test/lint jobs skip them.
      - run: cargo clippy -p fluxion-cli --features realtime --all-targets --locked -- -D warnings
      - run: cargo test -p fluxion-cli --features realtime --locked

  deny:
    name: cargo-deny (licenses & advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check

  python:
    name: python bindings (maturin + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/fluxion-py
      # torch / jax are not installed (heavy); those adapter tests skip — eager API, the analytic
      # gradcheck, and scipy filter-design parity are the guards here.
      - run: pip install --upgrade pip maturin numpy pytest scipy array_api_strict array-api-compat
      - run: maturin build --release -m crates/fluxion-py/Cargo.toml --out dist
      - run: pip install dist/*.whl
      - run: pytest crates/fluxion-py/tests/ -v
